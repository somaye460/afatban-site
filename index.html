<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>آفت‌بان</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Vazirmatn',sans-serif;
    height:100vh;
    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #000000 0%,
        #111111 25%,
        #050505 50%,
        #141414 75%,
        #000000 100%
    );

    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* بافت لمینتی */

body::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,.015) 0px,
        rgba(255,255,255,.015) 2px,
        transparent 2px,
        transparent 8px
    );

    opacity:.25;
}

/* نور موس */

.cursor-light{
    position:absolute;

    width:550px;
    height:550px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.10) 0%,
        rgba(220,235,255,.08) 25%,
        rgba(180,210,255,.04) 50%,
        transparent 80%
    );

    filter:blur(60px);

    pointer-events:none;

    transform:translate(-50%,-50%);
}

/* محتوا */

.hero{
    position:relative;
    z-index:10;
    text-align:center;
    padding:20px;

    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{

position:relative;

display:inline-block;

font-size:clamp(60px,10vw,130px);

font-weight:900;

letter-spacing:-2px;

overflow:hidden;

}

.logo span{

background:
linear-gradient(
90deg,
#ffffff 0%,
#dfe8f7 40%,
#ffffff 50%,
#dfe8f7 60%,
#ffffff 100%
);

background-size:300% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
shineMove 6s linear infinite,
logoGlow 4s ease-in-out infinite;

}

@keyframes shineMove{

0%{
background-position:-200% center;
}

100%{
background-position:200% center;
}

}

@keyframes logoGlow{

0%,100%{
filter:drop-shadow(
0 0 8px rgba(255,255,255,.12)
);
}

50%{
filter:
drop-shadow(
0 0 15px rgba(255,255,255,.25)
)
drop-shadow(
0 0 30px rgba(220,235,255,.12)
);
}

.subtitle{

    margin-top:12px;

    color:#d8dde8;

    font-size:clamp(16px,2vw,24px);

    font-weight:300;
}

.line{

    width:220px;
    height:2px;

    margin:30px auto;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.1),
        rgba(220,235,255,.9),
        rgba(255,255,255,.1),
        transparent
    );
}

/* دکمه */

.btn{

    display:inline-block;

    padding:15px 35px;

    border-radius:999px;

    text-decoration:none;

    color:white;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    transition:.3s;
}

.btn:hover{

    transform:translateY(-2px);

    background:
    rgba(255,255,255,.08);

    box-shadow:
    0 0 20px rgba(220,235,255,.15);
}

/* ذرات */

.particle{

    position:absolute;

    border-radius:50%;

    opacity:.75;

    box-shadow:
    0 0 8px rgba(255,255,255,.8),
    0 0 18px rgba(220,235,255,.4);

    animation:float linear infinite;
}

@keyframes float{

    from{
        transform:translateY(110vh);
    }

    to{
        transform:translateY(-120px);
    }
}

/* موبایل */

@media (max-width:768px){

    .logo{
        font-size:58px;
        line-height:1.2;
    }

    .subtitle{
        font-size:16px;
        padding:0 15px;
    }

    .line{
        width:140px;
    }

    .btn{
        padding:14px 28px;
        font-size:15px;
    }

    .cursor-light{
        width:260px;
        height:260px;
    }
}

</style>
</head>

<body>

<div class="cursor-light" id="light"></div>

<div class="hero">

    <div class="logo">
    <span>آفت‌بان</span>
</div>

    <div class="subtitle">
        راهکارهای نوین کنترل آفات خانگی
    </div>

    <div class="line"></div>

    <a href="about.html" class="btn">
        ورود به سایت
    </a>

</div>

<script>

/* نور موس */

const light = document.getElementById("light");

document.addEventListener("mousemove",(e)=>{

    light.style.left = e.clientX + "px";
    light.style.top = e.clientY + "px";

});

/* ذرات */

const colors = [
"#ffffff",
"#eef5ff",
"#dfeeff",
"#f8f8f8"
];

for(let i=0;i<80;i++){

    let p = document.createElement("div");

    p.classList.add("particle");

    let size = Math.random()*4 + 2;

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random()*100 + "vw";

    p.style.background =
    colors[Math.floor(Math.random()*colors.length)];

    p.style.animationDuration =
    (Math.random()*18 + 12) + "s";

    p.style.animationDelay =
    (Math.random()*10) + "s";

    document.body.appendChild(p);
}

</script>

</body>
</html>
