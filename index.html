<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>آفت‌بان</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Vazirmatn',sans-serif;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at center,#1a1a1a 0%,#080808 40%,#000000 100%);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* مه */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,
rgba(255,255,255,.015),
transparent 60%);
animation:fog 20s linear infinite;
}

@keyframes fog{
0%{
transform:translate(-10%,-10%) rotate(0deg);
}
100%{
transform:translate(10%,10%) rotate(360deg);
}
}

/* نور دنبال کننده موس */

.cursor-light{
position:absolute;
width:650px;
height:650px;
border-radius:50%;

background:
radial-gradient(circle,

rgba(255,255,255,.10) 0%,

rgba(220,235,255,.08) 20%,

rgba(180,210,255,.05) 40%,

rgba(255,255,255,.02) 60%,

transparent 80%
);

pointer-events:none;
transform:translate(-50%,-50%);
filter:blur(60px);
}

/* محتوای اصلی */

.hero{
position:relative;
z-index:10;
text-align:center;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:clamp(60px,9vw,140px);
font-weight:900;
letter-spacing:-2px;

background:linear-gradient(
180deg,
#ffffff,
#d6ffe9
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(255,255,255,.7),
0 0 25px rgba(255,255,255,.4),
0 0 60px rgba(220,235,255,.25),
0 0 120px rgba(180,210,255,.12);

.subtitle{
margin-top:15px;
font-size:clamp(16px,2vw,24px);
color:#d9e7df;
font-weight:300;
letter-spacing:.5px;
}

/* خط نور */

.line{
margin:30px auto;
width:180px;
height:2px;
background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.1),
rgba(220,235,255,.95),
rgba(255,255,255,.1),
transparent
);
}

/* دکمه */

.btn{
display:inline-block;
padding:16px 40px;
margin-top:15px;

border:1px solid rgba(255,255,255,.15);

background:
rgba(255,255,255,.05);

backdrop-filter:blur(12px);

color:white;

text-decoration:none;

border-radius:50px;

transition:.4s;
}

.btn:hover{
transform:translateY(-3px);

background:
rgba(0,255,170,.12);

box-shadow:
0 0 40px rgba(0,255,170,.25);
}

/* ذرات */

.particle{
position:absolute;
background:white;
border-radius:50%;
opacity:.25;
animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

</style>
</head>

<body>

<div class="cursor-light" id="light"></div>

<div class="hero">

<div class="logo">
آفت‌بان
</div>

<div class="subtitle">
راهکارهای نوین کنترل آفات خانگی
</div>

<div class="line"></div>

<a href="about.html" class="btn">
ورود به سایت
</a>

</div>

<script>

/* نور موس */

const light=document.getElementById("light");

document.addEventListener("mousemove",(e)=>{
light.style.left=e.clientX+"px";
light.style.top=e.clientY+"px";
});

/* ذرات شناور */

for(let i=0;i<180;i++){

let p=document.createElement("div");

p.classList.add("particle");
  const colors=[
"#ffffff",
"#eef5ff",
"#dfeeff",
"#f8f8f8"
];

p.style.background=
colors[Math.floor(Math.random()*colors.length)];

let size=Math.random()*4+1;

p.style.width=size+"px";
p.style.height=size+"px";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=
(Math.random()*15+10)+"s";

p.style.animationDelay=
(Math.random()*10)+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
